# fly.toml configuration file for second-brain-backend

app = "second-brain-api-mizin"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  DATABASE_PATH = "/data/chroma_db"

[[mounts]]
  source = "second_brain_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "2gb" # ChromaDB and HuggingFace embeddings need at least 1-2GB of RAM
  cpu_kind = "shared"
